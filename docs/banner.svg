<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Valorant Scout">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#07080B"/>
    <stop offset="0.58" stop-color="#0A0A0E"/>
    <stop offset="1" stop-color="#13090D"/>
  </linearGradient>
  <radialGradient id="glowL" cx="0.13" cy="0.50" r="0.42">
    <stop offset="0" stop-color="#FF4655" stop-opacity=".17"/>
    <stop offset="1" stop-color="#FF4655" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="glowR" cx="0.91" cy="0.43" r="0.42">
    <stop offset="0" stop-color="#FF4655" stop-opacity=".10"/>
    <stop offset="1" stop-color="#FF4655" stop-opacity="0"/>
  </radialGradient>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0H0V40" fill="none" stroke="#FFFFFF" stroke-opacity=".028"/>
  </pattern>
  <filter id="blur" x="-100%" y="-100%" width="300%" height="300%">
    <feGaussianBlur stdDeviation="18"/>
  </filter>
</defs>

<!-- background -->
<rect width="1200" height="300" fill="url(#bg)"/>
<rect width="1200" height="300" fill="url(#grid)"/>
<rect width="1200" height="300" fill="url(#glowL)"/>
<rect width="1200" height="300" fill="url(#glowR)"/>
<path d="M850 0H1200V300H985Z" fill="#FF4655" opacity=".028"/>
<path d="M905 0L1033 300M952 0L1080 300" stroke="#FF4655" stroke-opacity=".11"/>
<rect width="1200" height="4" fill="#FF4655"/>
<rect y="296" width="1200" height="4" fill="#FF4655"/>

<!-- corner marks -->
<g stroke="#FF4655" stroke-opacity=".45">
  <path d="M25 36V24H43M1175 36V24H1157M25 264V276H43M1175 264V276H1157"/>
</g>

<!-- watermark: exact shape traced from the supplied icon -->
<g transform="translate(855 26)" opacity=".10">
  <rect x="0" y="0" width="310" height="238" rx="54" fill="none" stroke="#FF4655" stroke-width="4"/>
  <g transform="translate(23 -2) scale(1.18)">
    <path d="M224 48H184L124 124L148 156L222 63Z" fill="#FF4655"/>
    <path d="M32 48L136 200H224V172H152L69 49Z" fill="#FF4655"/>
  </g>
</g>

<!-- logo card -->
<rect x="72" y="69" width="160" height="160" rx="42" fill="#FF4655" opacity=".18" filter="url(#blur)"/>
<rect x="50" y="46" width="206" height="208" rx="48" fill="#0A0B0F" fill-opacity=".95" stroke="#FFFFFF" stroke-opacity=".08"/>
<g transform="translate(61 57)">
  <rect width="184" height="184" rx="43" fill="#0E0F13" stroke="#FF4655" stroke-width="2"/>
  <g transform="translate(0 0) scale(.71875)">
    <path d="M224 48H184L124 124L148 156L222 63Z" fill="#FF4655"/>
    <path d="M32 48L136 200H224V172H152L69 49Z" fill="#FF4655"/>
  </g>
</g>

<!-- eyebrow -->
<text x="292" y="49" font-family="Consolas,Menlo,monospace" font-size="10" letter-spacing="2.6" fill="#FF4655" opacity=".86">
  LOCAL MATCH INTELLIGENCE
</text>

<!-- title -->
<text x="292" y="119" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="66" font-weight="900" letter-spacing="-1.5" fill="#F6F7F9">
  VALORANT
</text>
<text x="665" y="119" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="66" font-weight="900" letter-spacing="-1.5" fill="#FF4655">
  SCOUT
</text>

<!-- divider -->
<rect x="292" y="139" width="78" height="4" rx="2" fill="#FF4655"/>
<rect x="376" y="139" width="66" height="4" rx="2" fill="#FFFFFF" opacity=".12"/>

<!-- copy -->
<text x="292" y="176" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" letter-spacing=".15" fill="#E1E4E9">
  KNOW THE LOBBY BEFORE THE FIRST ROUND.
</text>
<text x="292" y="204" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="500" fill="#92969F">
  Live ranks, party detection and smurf signals — read locally from your client.
</text>

<!-- feature chips -->
<g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#D3D6DD">
  <g transform="translate(292 225)">
    <rect width="96" height="28" rx="7" fill="#FFFFFF" opacity=".045"/>
    <rect width="96" height="28" rx="7" fill="none" stroke="#FFFFFF" stroke-opacity=".08"/>
    <circle cx="13" cy="14" r="3" fill="#FF4655"/>
    <text x="23" y="18">LIVE RANKS</text>
  </g>
  <g transform="translate(398 225)">
    <rect width="112" height="28" rx="7" fill="#FFFFFF" opacity=".045"/>
    <rect width="112" height="28" rx="7" fill="none" stroke="#FFFFFF" stroke-opacity=".08"/>
    <circle cx="13" cy="14" r="3" fill="#FF4655"/>
    <text x="23" y="18">SMURF RADAR</text>
  </g>
  <g transform="translate(520 225)">
    <rect width="142" height="28" rx="7" fill="#FFFFFF" opacity=".045"/>
    <rect width="142" height="28" rx="7" fill="none" stroke="#FFFFFF" stroke-opacity=".08"/>
    <circle cx="13" cy="14" r="3" fill="#FF4655"/>
    <text x="23" y="18">PARTY DETECTION</text>
  </g>
  <g transform="translate(672 225)">
    <rect width="118" height="28" rx="7" fill="#FFFFFF" opacity=".045"/>
    <rect width="118" height="28" rx="7" fill="none" stroke="#FFFFFF" stroke-opacity=".08"/>
    <circle cx="13" cy="14" r="3" fill="#FF4655"/>
    <text x="23" y="18">AGENT SELECT</text>
  </g>
</g>

<!-- status -->
<g transform="translate(1012 27)">
  <rect width="155" height="32" rx="8" fill="#08090C" fill-opacity=".82" stroke="#FFFFFF" stroke-opacity=".09"/>
  <circle cx="21" cy="16" r="5" fill="#FF4655"/>
  <text x="35" y="20" font-family="Consolas,Menlo,monospace" font-size="10" fill="#D7DAE0">LIVE / LOCAL</text>
</g>
<text x="935" y="272" font-family="Consolas,Menlo,monospace" font-size="9" fill="#777B84" opacity=".78">
  PRIVATE • REAL-TIME • LOCAL
</text>
</svg>